<ion-header>
  <ion-toolbar>
    <ion-title>{{ categoryName }}</ion-title>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/"></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <ion-list>
    <ion-item *ngFor="let item of subcategories"> {{ item }} </ion-item>
  </ion-list>
</ion-content>
